duckbike:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Single source of truth: build_and_publish exports DEV_DB_PATH (absolute).
      # The fallback applies only when running dbt manually from this project dir.
      path: "{{ env_var('DEV_DB_PATH', '../../dev.duckdb') }}"
      extensions:
        - httpfs
        - spatial
      secrets:
        - type: s3
          key_id: "{{ env_var('R2_ACCESS_KEY_ID') }}"
          secret: "{{ env_var('R2_SECRET_ACCESS_KEY') }}"
          endpoint: "{{ env_var('S3_ENDPOINT') }}"
          region: auto
          url_style: path
          use_ssl: true
