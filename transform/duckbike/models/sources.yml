sources:
  - name: dott
    description: >
      Raw GBFS feed polled from Dott Paris every 10 minutes via GitHub Actions.
      Files are written as Parquet to Cloudflare R2.
    tables:
      - name: free_bike_status
        meta:
          external_location: "read_parquet('s3://gbfs-raw-data/**/*.parquet', hive_partitioning=1)"
        loaded_at_field: snapshot_ts
        freshness:
          warn_after: { count: 30, period: minute }
          error_after: { count: 60, period: minute }
        columns:
          - name: bike_id
            description: >
              Operator-assigned bike identifier from GBFS. NOT stable across snapshots —
              Dott rotates IDs.
            tests:
              - not_null
          - name: lat
            description: Latitude (WGS84).
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: "between 48.7 and 49.0"
                  config: { severity: warn }
          - name: lon
            description: Longitude (WGS84).
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: "between 2.1 and 2.6"
                  config: { severity: warn }
          - name: battery_pct
            description: >
              Battery level, 0.0–1.0
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: "between 0 and 1"
                  config: { severity: warn }
          - name: range_km
            description: Estimated remaining range in kilometers.
            tests:
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: ">= 0"
                  config: { severity: warn }
          - name: last_reported
            description: >
              UTC timestamp when the bike hardware last reported to Dott.
            tests:
              - not_null
          - name: h3_index
            description: >
              H3 cell at resolution 9, computed at ingestion from (lat, lon).
            tests:
              - not_null
          - name: snapshot_ts
            description: >
              UTC timestamp of the poll that captured this row.
            tests:
              - not_null
        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns: [bike_id, snapshot_ts]
              config: { severity: warn }

  - name: routing
    description: >
      Pre-computed walk-time matrix between H3 cells, stored as Parquet in R2.
      Generated by jobs/build_walk_time_matrix.py using the OSM network.
    tables:
      - name: walk_time_matrix
        meta:
          external_location: "read_parquet('s3://duckbike-warehouse/reference/walk_time_matrix.parquet')"
        description: >
          Pairwise walk times (minutes) between H3 resolution-9 cells within the
          Dott Paris operating zone. Capped at 20 minutes. Rebuilt on demand.
        columns:
          - name: origin_h3
            description: Origin H3 cell (resolution 9).
          - name: destination_h3
            description: Destination H3 cell (resolution 9).
          - name: walk_minutes
            description: Walking time in minutes from origin to destination.
